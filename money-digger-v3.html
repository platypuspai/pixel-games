<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Money Digger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'DM Sans',sans-serif}
#scene{position:fixed;inset:0;width:100%;height:100%}
#hud-left{position:fixed;top:20px;left:20px;z-index:20;pointer-events:none}
#hud-alt{font-size:2.4rem;font-weight:700;color:#fff;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.6);letter-spacing:-1px}
#hud-unit{font-size:.9rem;font-weight:300;color:rgba(255,255,255,.6);margin-top:2px}
#hud-next{margin-top:8px;font-size:.68rem;color:rgba(255,255,255,.45);max-width:240px;line-height:1.5}
#bill-counter{position:fixed;bottom:116px;right:32px;z-index:20;text-align:right;pointer-events:none}
#bill-number{font-size:1.3rem;font-weight:700;color:#22c55e;font-family:'DM Mono',monospace;text-shadow:0 2px 15px rgba(34,197,94,.4)}
#bill-label{font-size:.58rem;color:rgba(255,255,255,.35);margin-top:2px}
#click-btn{position:fixed;bottom:28px;right:28px;z-index:20;width:76px;height:76px;border-radius:50%;border:none;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;font-size:1.7rem;cursor:pointer;box-shadow:0 4px 24px rgba(34,197,94,.5);transition:transform .08s;display:flex;align-items:center;justify-content:center;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 24px rgba(34,197,94,.5),0 0 0 0 rgba(34,197,94,.3)}70%{box-shadow:0 4px 24px rgba(34,197,94,.5),0 0 0 18px rgba(34,197,94,0)}}
#click-btn:active{transform:scale(.88);animation:none}
#scoreboard{position:fixed;top:20px;right:20px;z-index:20;background:rgba(0,0,0,.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 14px;min-width:140px}
#scoreboard h3{font-size:.55rem;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.score-row{display:flex;justify-content:space-between;gap:12px;font-size:.62rem;color:rgba(255,255,255,.55);padding:2px 0}
.score-row.me{color:#22c55e}
.score-name{max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-val{font-family:'DM Mono',monospace;font-size:.58rem}
#mp-bar{position:fixed;bottom:28px;left:20px;z-index:20;display:flex;align-items:center;gap:5px}
#mp-bar button{font-family:'DM Sans',sans-serif;font-size:.58rem;padding:4px 9px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);border-radius:6px;cursor:pointer}
#mp-bar button:hover{background:rgba(255,255,255,.13)}
#mp-status{font-size:.58rem;color:rgba(255,255,255,.3)}
#code-input{font-family:'DM Mono',monospace;font-size:.58rem;width:52px;padding:3px 5px;background:rgba(0,0,0,.5);color:#22c55e;border:1px solid rgba(34,197,94,.3);border-radius:5px;display:none}
#btn-join-confirm{display:none}
#name-wrap{position:fixed;bottom:76px;left:20px;z-index:20;display:flex;align-items:center;gap:5px}
#name-lbl{font-size:.55rem;color:rgba(255,255,255,.25)}
#name-input{font-family:'DM Sans',sans-serif;font-size:.58rem;padding:3px 7px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.08);border-radius:5px;width:105px}
#ms-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;text-align:center;pointer-events:none;opacity:0;transition:opacity .5s}
#ms-banner.show{opacity:1}
#ms-emoji{font-size:3rem}
#ms-name{font-size:1.2rem;font-weight:700;color:#fff;margin-top:6px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
#ms-sub{font-size:.65rem;color:rgba(255,255,255,.55);margin-top:3px}
.fb{position:fixed;font-size:1.2rem;pointer-events:none;z-index:25;animation:fup .85s ease-out forwards}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.6)}}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="hud-left"><div id="hud-alt">0,000</div><div id="hud-unit">millimeter</div><div id="hud-next"></div></div>
<div id="bill-counter"><div id="bill-number">0</div><div id="bill-label">biljetten gestapeld</div></div>
<button id="click-btn">💵</button>
<div id="scoreboard"><h3>Top klikkers</h3><div id="score-list"></div></div>
<div id="name-wrap"><span id="name-lbl">naam:</span><input id="name-input" type="text" maxlength="16"/></div>
<div id="mp-bar"><button id="btn-host">Host</button><button id="btn-join">Join</button><input id="code-input" type="text" placeholder="code..." maxlength="4"/><button id="btn-join-confirm">OK</button><span id="mp-status">offline</span></div>
<div id="ms-banner"><div id="ms-emoji"></div><div id="ms-name"></div><div id="ms-sub"></div></div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const BILL_M=0.0001; // 0.1mm per biljet
const canvas=document.getElementById('scene');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);

// STATE
let totalBills=parseInt(localStorage.getItem('md3_b')||'0');
let myClicks=parseInt(localStorage.getItem('md3_c')||'0');
let myName=localStorage.getItem('md3_n')||'Speler'+Math.floor(Math.random()*9999);
let scores=JSON.parse(localStorage.getItem('md3_s')||'{}');
let shownMS=new Set(JSON.parse(localStorage.getItem('md3_m')||'[]'));
let displayBills=totalBills;
let cloudT=0;

// OBJECTS (sorted by real height in meters)
const OBJECTS=[
  {m:0.001, label:'Mier',            emoji:'🐜',  draw:dAnt},
  {m:0.015, label:'Druif',           emoji:'🍇',  draw:dGrape},
  {m:0.040, label:'Aardbei',         emoji:'🍓',  draw:dStrawberry},
  {m:0.070, label:'Muis',            emoji:'🐭',  draw:dMouse},
  {m:0.120, label:'Appel',           emoji:'🍎',  draw:dApple},
  {m:0.240, label:'Basketbal',       emoji:'🏀',  draw:dBasketball},
  {m:0.300, label:'Tulp',            emoji:'🌷',  draw:dTulip},
  {m:0.450, label:'Zonnebloem',      emoji:'🌻',  draw:dSunflower},
  {m:0.600, label:'Kat',             emoji:'🐱',  draw:dCat},
  {m:0.900, label:'Hond',            emoji:'🐕',  draw:dDog},
  {m:1.750, label:'Mens',            emoji:'🧍',  draw:dHuman},
  {m:2.400, label:'Paard',           emoji:'🐴',  draw:dHorse},
  {m:4.000, label:'Olifant',         emoji:'🐘',  draw:dElephant},
  {m:5.500, label:'Giraf',           emoji:'🦒',  draw:dGiraffe},
  {m:7.000, label:'Jonge boom',      emoji:'🌲',  draw:dSmallTree},
  {m:8.500, label:'Huis',            emoji:'🏠',  draw:dHouse},
  {m:15.00, label:'Grote eik',       emoji:'🌳',  draw:dOak},
  {m:25.00, label:'Sequoia',         emoji:'🌲',  draw:dSequoia},
  {m:46.00, label:'Scheve toren van Pisa', emoji:'🗼', draw:dPisa},
  {m:93.00, label:'Vrijheidsbeeld',  emoji:'🗽',  draw:dLiberty},
  {m:115.0, label:'Reuzensequoia',   emoji:'🌲',  draw:dGiantSeq},
  {m:169.0, label:'Washington Monument', emoji:'🏛️', draw:dWashington},
  {m:324.0, label:'Eiffeltoren',     emoji:'🗼',  draw:dEiffel},
  {m:443.0, label:'Empire State',    emoji:'🏙️',  draw:dEmpire},
  {m:828.0, label:'Burj Khalifa',    emoji:'🏙️',  draw:dBurj},
  {m:1000,  label:'1 kilometer!',    emoji:'🎉',  draw:null},
  {m:2000,  label:'Laagste wolken',  emoji:'☁️',  draw:null},
  {m:8849,  label:'Everest top',     emoji:'🏔️',  draw:null},
  {m:10000, label:'Vliegtuig',       emoji:'✈️',  draw:null},
  {m:100000,label:'Ruimte!',         emoji:'🚀',  draw:null},
];

// ── DRAW FUNCTIONS (cx=center x, gy=ground y, sh=pixel height) ──
function dAnt(cx,gy,sh){
  const s=Math.max(sh,3);
  ctx.fillStyle='#2d1a0e';
  ctx.beginPath();ctx.ellipse(cx,gy-s*.3,s*.18,s*.12,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,gy-s*.55,s*.13,s*.1,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,gy-s*.78,s*.11,s*.14,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#2d1a0e';ctx.lineWidth=Math.max(.4,s*.015);
  for(let i=0;i<3;i++){const dy=gy-s*(.22+i*.08);ctx.beginPath();ctx.moveTo(cx-s*.14,dy);ctx.lineTo(cx-s*.32,dy-s*.08);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+s*.14,dy);ctx.lineTo(cx+s*.32,dy-s*.08);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(cx-s*.04,gy-s*.88);ctx.lineTo(cx-s*.18,gy-s*1.06);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*.04,gy-s*.88);ctx.lineTo(cx+s*.18,gy-s*1.06);ctx.stroke();
}
function dGrape(cx,gy,sh){
  const r=sh*.18;
  const pts=[[0,-.12],[-.18,-.3],[.18,-.3],[-.36,-.12],[0,-.42],[.36,-.12],[-.18,-.58],[.18,-.58],[0,-.72]];
  for(const [dx,dy] of pts){
    const g=ctx.createRadialGradient(cx+dx*sh-r*.3,gy+dy*sh-r*.3,r*.1,cx+dx*sh,gy+dy*sh,r);
    g.addColorStop(0,'#a855f7');g.addColorStop(1,'#581c87');ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(cx+dx*sh,gy+dy*sh,r,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='#5a3a1a';ctx.lineWidth=Math.max(1,sh*.06);
  ctx.beginPath();ctx.moveTo(cx,gy-sh*.78);ctx.lineTo(cx,gy-sh*.92);ctx.stroke();
  ctx.fillStyle='#16a34a';ctx.beginPath();ctx.ellipse(cx-sh*.12,gy-sh*.9,sh*.12,sh*.06,-.4,0,Math.PI*2);ctx.fill();
}
function dStrawberry(cx,gy,sh){
  const g=ctx.createRadialGradient(cx-sh*.1,gy-sh*.5,sh*.05,cx,gy-sh*.4,sh*.5);
  g.addColorStop(0,'#ff6b6b');g.addColorStop(1,'#c0392b');ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(cx,gy);ctx.bezierCurveTo(cx-sh*.5,gy,cx-sh*.55,gy-sh*.5,cx-sh*.3,gy-sh*.7);ctx.bezierCurveTo(cx-sh*.15,gy-sh*.9,cx+sh*.15,gy-sh*.9,cx+sh*.3,gy-sh*.7);ctx.bezierCurveTo(cx+sh*.55,gy-sh*.5,cx+sh*.5,gy,cx,gy);ctx.fill();
  ctx.fillStyle='rgba(255,255,200,.7)';
  for(const [dx,dy] of[[-sh*.15,-.3],[sh*.1,-.45],[-sh*.05,-.6],[sh*.2,-.25],[0,-.18]]){ctx.beginPath();ctx.ellipse(cx+dx,gy+dy*sh,sh*.022,sh*.016,0,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#15803d';
  for(let a=-1;a<=1;a++){ctx.save();ctx.translate(cx,gy-sh*.82);ctx.rotate(a*.4);ctx.beginPath();ctx.ellipse(0,0,sh*.07,sh*.18,0,0,Math.PI*2);ctx.fill();ctx.restore();}
}
function dMouse(cx,gy,sh){
  const w=sh*.7;
  ctx.fillStyle='#9ca3af';
  ctx.beginPath();ctx.ellipse(cx,gy-sh*.25,w*.4,sh*.28,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+w*.2,gy-sh*.6,w*.28,sh*.24,.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#d1d5db';ctx.beginPath();ctx.ellipse(cx+w*.18,gy-sh*.82,sh*.1,sh*.1,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.ellipse(cx+w*.18,gy-sh*.82,sh*.06,sh*.06,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx+w*.38,gy-sh*.65,sh*.022,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=Math.max(1,sh*.03);
  ctx.beginPath();ctx.moveTo(cx-w*.4,gy-sh*.15);ctx.quadraticCurveTo(cx-w*.9,gy-sh*.4,cx-w*.7,gy-sh*.6);ctx.stroke();
}
function dApple(cx,gy,sh){
  const g=ctx.createRadialGradient(cx-sh*.2,gy-sh*.5,sh*.05,cx,gy-sh*.4,sh*.55);
  g.addColorStop(0,'#ff6b6b');g.addColorStop(.6,'#dc2626');g.addColorStop(1,'#991b1b');ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(cx,gy-sh*.05);ctx.bezierCurveTo(cx-sh*.55,gy-sh*.05,cx-sh*.6,gy-sh*.55,cx-sh*.45,gy-sh*.72);ctx.bezierCurveTo(cx-sh*.3,gy-sh*.9,cx-sh*.1,gy-sh*.92,cx,gy-sh*.85);ctx.bezierCurveTo(cx+sh*.1,gy-sh*.92,cx+sh*.3,gy-sh*.9,cx+sh*.45,gy-sh*.72);ctx.bezierCurveTo(cx+sh*.6,gy-sh*.55,cx+sh*.55,gy-sh*.05,cx,gy-sh*.05);ctx.fill();
  ctx.strokeStyle='#5a3a1a';ctx.lineWidth=Math.max(1,sh*.04);
  ctx.beginPath();ctx.moveTo(cx,gy-sh*.85);ctx.quadraticCurveTo(cx+sh*.08,gy-sh*.95,cx+sh*.04,gy-sh*1.05);ctx.stroke();
  ctx.fillStyle='#16a34a';ctx.beginPath();ctx.ellipse(cx+sh*.08,gy-sh*.97,sh*.12,sh*.06,-.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.ellipse(cx-sh*.15,gy-sh*.6,sh*.07,sh*.12,-.3,0,Math.PI*2);ctx.fill();
}
function dBasketball(cx,gy,sh){
  const r=sh*.5;const cy2=gy-r;
  const g=ctx.createRadialGradient(cx-r*.3,cy2-r*.3,r*.05,cx,cy2,r);
  g.addColorStop(0,'#fb923c');g.addColorStop(1,'#c2410c');ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(cx,cy2,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#1c0a00';ctx.lineWidth=Math.max(1,r*.05);
  ctx.beginPath();ctx.arc(cx,cy2,r,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-r,cy2);ctx.lineTo(cx+r,cy2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy2-r);ctx.lineTo(cx,cy2+r);ctx.stroke();
  ctx.beginPath();ctx.arc(cx-r*.3,cy2,r*.72,-.5,.5);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+r*.3,cy2,r*.72,Math.PI-.5,Math.PI+.5);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.ellipse(cx-r*.28,cy2-r*.32,r*.18,r*.1,-.4,0,Math.PI*2);ctx.fill();
}
function dTulip(cx,gy,sh){
  ctx.strokeStyle='#16a34a';ctx.lineWidth=Math.max(1.5,sh*.04);
  ctx.beginPath();ctx.moveTo(cx,gy);ctx.quadraticCurveTo(cx+sh*.1,gy-sh*.5,cx,gy-sh*.7);ctx.stroke();
  ctx.fillStyle='#22c55e';ctx.beginPath();ctx.ellipse(cx-sh*.12,gy-sh*.35,sh*.06,sh*.18,-.3,0,Math.PI*2);ctx.fill();
  const pc=['#e11d48','#f43f5e'];
  const pts=[[-sh*.12,-sh*.88,-.4],[-sh*.06,-sh*.95,-.1],[0,-sh*.98,0],[sh*.06,-sh*.95,.1],[sh*.12,-sh*.88,.4]];
  for(let i=0;i<pts.length;i++){
    const[px,py,ang]=pts[i];ctx.save();ctx.translate(cx+px,gy+py);ctx.rotate(ang);
    const pg=ctx.createRadialGradient(0,sh*.1,0,0,0,sh*.18);
    pg.addColorStop(0,pc[i%2]);pg.addColorStop(1,'#9f1239');ctx.fillStyle=pg;
    ctx.beginPath();ctx.ellipse(0,0,sh*.1,sh*.22,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}
function dSunflower(cx,gy,sh){
  ctx.strokeStyle='#15803d';ctx.lineWidth=Math.max(2,sh*.05);
  ctx.beginPath();ctx.moveTo(cx,gy);ctx.quadraticCurveTo(cx-sh*.08,gy-sh*.5,cx,gy-sh*.7);ctx.stroke();
  const np=14;
  for(let i=0;i<np;i++){
    const a=i/np*Math.PI*2;
    ctx.save();ctx.translate(cx+Math.cos(a)*sh*.22,gy-sh*.82+Math.sin(a)*sh*.22);ctx.rotate(a);
    ctx.fillStyle='#facc15';ctx.beginPath();ctx.ellipse(0,0,sh*.07,sh*.15,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  const dg=ctx.createRadialGradient(cx,gy-sh*.82,0,cx,gy-sh*.82,sh*.15);
  dg.addColorStop(0,'#92400e');dg.addColorStop(1,'#451a03');ctx.fillStyle=dg;
  ctx.beginPath();ctx.arc(cx,gy-sh*.82,sh*.15,0,Math.PI*2);ctx.fill();
}
function dCat(cx,gy,sh){
  const w=sh*.5;
  ctx.fillStyle='#d97706';
  ctx.beginPath();ctx.ellipse(cx,gy-sh*.28,w*.38,sh*.3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,gy-sh*.68,w*.32,sh*.28,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx-w*.22,gy-sh*.88);ctx.lineTo(cx-w*.32,gy-sh*1.05);ctx.lineTo(cx-w*.08,gy-sh*.9);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+w*.22,gy-sh*.88);ctx.lineTo(cx+w*.32,gy-sh*1.05);ctx.lineTo(cx+w*.08,gy-sh*.9);ctx.fill();
  ctx.fillStyle='#fca5a5';
  ctx.beginPath();ctx.moveTo(cx-w*.22,gy-sh*.9);ctx.lineTo(cx-w*.28,gy-sh*1.02);ctx.lineTo(cx-w*.12,gy-sh*.92);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+w*.22,gy-sh*.9);ctx.lineTo(cx+w*.28,gy-sh*1.02);ctx.lineTo(cx+w*.12,gy-sh*.92);ctx.fill();
  ctx.fillStyle='#84cc16';
  ctx.beginPath();ctx.ellipse(cx-w*.12,gy-sh*.72,w*.08,sh*.07,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+w*.12,gy-sh*.72,w*.08,sh*.07,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(cx-w*.12,gy-sh*.72,w*.03,sh*.07,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+w*.12,gy-sh*.72,w*.03,sh*.07,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(cx,gy-sh*.63,w*.04,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=Math.max(.4,sh*.01);
  for(let i=-1;i<=1;i+=2)for(let j=0;j<3;j++){ctx.beginPath();ctx.moveTo(cx+i*w*.05,gy-sh*.64+j*sh*.02);ctx.lineTo(cx+i*w*.38,gy-sh*.66+j*sh*.03);ctx.stroke();}
  ctx.strokeStyle='#d97706';ctx.lineWidth=Math.max(2,sh*.06);
  ctx.beginPath();ctx.moveTo(cx+w*.35,gy-sh*.15);ctx.quadraticCurveTo(cx+w*.7,gy-sh*.05,cx+w*.6,gy-sh*.4);ctx.stroke();
}
function dDog(cx,gy,sh){
  const w=sh*.8;
  ctx.fillStyle='#c2a07a';
  for(let i=0;i<4;i++)ctx.fillRect(cx-w*.35+i*w*.18,gy-sh*.22,w*.14,sh*.24);
  ctx.beginPath();ctx.ellipse(cx,gy-sh*.38,w*.42,sh*.22,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+w*.35,gy-sh*.62,w*.28,sh*.25,.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a0825a';ctx.beginPath();ctx.ellipse(cx+w*.52,gy-sh*.6,w*.14,sh*.12,.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#8b6340';ctx.beginPath();ctx.ellipse(cx+w*.22,gy-sh*.82,w*.12,sh*.18,-.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx+w*.4,gy-sh*.68,sh*.025,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+w*.58,gy-sh*.61,w*.05,sh*.04,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#c2a07a';ctx.lineWidth=Math.max(2,sh*.05);
  ctx.beginPath();ctx.moveTo(cx-w*.42,gy-sh*.38);ctx.quadraticCurveTo(cx-w*.65,gy-sh*.2,cx-w*.55,gy-sh*.05);ctx.stroke();
}
function dHuman(cx,gy,sh){
  const w=sh*.25;
  ctx.fillStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.ellipse(cx,gy-sh*.02,w*.8,sh*.025,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1e3a5f';

  // Perspective lines
  const vx=W/2;ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let i=-8;i<=8;i++){ctx.beginPath();ctx.moveTo(vx,gy);ctx.lineTo(vx+i*200,H);ctx.stroke();}
  for(let d=.05;d<1;d+=.12){const y=gy+(H-gy)*d;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Asphalt texture
  ctx.fillStyle='rgba(255,255,255,.018)';for(let i=0;i<150;i++){ctx.beginPath();ctx.arc((i*137.5)%W,gy+((i*97.3)%(H-gy)),1,0,Math.PI*2);ctx.fill();}
  // Cracks
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.5;
  for(let i=0;i<6;i++){const sx=W*(.1+i*.15),sy=gy+20+i*15;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+30+i*10,sy+10+i*5);ctx.stroke();}
  // Road markings
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=2;ctx.setLineDash([20,30]);
  ctx.beginPath();ctx.moveTo(W/2-80,gy);ctx.lineTo(W/2-200,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2+80,gy);ctx.lineTo(W/2+200,H);ctx.stroke();
  ctx.setLineDash([]);
  // Stack shadow
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.ellipse(W/2+11,gy+5,75,9,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// MONEY STACK
function drawMoneyStack(bills){
  if(bills<=0)return;
  const gy=H*.72,cx=W/2;
  const maxPx=H*.65;
  const pxPerBill=bills>maxPx?maxPx/bills:Math.max(.5,maxPx/Math.max(bills,1));
  const clampedH=Math.min(bills*pxPerBill,maxPx);
  if(clampedH<.1)return;
  const sw=110,depth=22,top=gy-clampedH;

  // Right side
  const rg=ctx.createLinearGradient(cx+sw/2,top,cx+sw/2+depth,top-depth*.5);
  rg.addColorStop(0,'#14532d');rg.addColorStop(1,'#052e16');ctx.fillStyle=rg;
  ctx.beginPath();ctx.moveTo(cx+sw/2,top);ctx.lineTo(cx+sw/2+depth,top-depth*.5);ctx.lineTo(cx+sw/2+depth,gy-depth*.5);ctx.lineTo(cx+sw/2,gy);ctx.fill();

  // Front face
  const fg=ctx.createLinearGradient(cx-sw/2,top,cx+sw/2,gy);
  fg.addColorStop(0,'#15803d');fg.addColorStop(.35,'#22c55e');fg.addColorStop(.7,'#16a34a');fg.addColorStop(1,'#14532d');ctx.fillStyle=fg;
  ctx.fillRect(cx-sw/2,top,sw,clampedH);

  // Bill lines
  const le=Math.max(1,Math.floor(clampedH/Math.min(80,bills)));
  ctx.strokeStyle='rgba(0,60,20,.28)';ctx.lineWidth=.6;
  for(let y=gy;y>top;y-=le){ctx.beginPath();ctx.moveTo(cx-sw/2,y);ctx.lineTo(cx+sw/2,y);ctx.stroke();}

  // Dollar details
  if(clampedH>25){
    ctx.fillStyle='rgba(255,255,255,.09)';ctx.beginPath();ctx.ellipse(cx,top+clampedH*.5,sw*.2,clampedH*.15,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.13)';ctx.font=`bold ${Math.min(44,clampedH*.28)}px serif`;ctx.textAlign='center';ctx.fillText('$',cx,top+clampedH*.58);ctx.textAlign='left';
    ctx.strokeStyle='rgba(0,80,20,.18)';ctx.lineWidth=1;ctx.strokeRect(cx-sw/2+3,top+3,sw-6,clampedH-6);
  }

  // Top face (crucial — the top of the stack)
  const tg=ctx.createLinearGradient(cx-sw/2,top,cx+sw/2+depth,top-depth*.5);
  tg.addColorStop(0,'#4ade80');tg.addColorStop(.4,'#86efac');tg.addColorStop(1,'#22c55e');ctx.fillStyle=tg;
  ctx.beginPath();ctx.moveTo(cx-sw/2,top);ctx.lineTo(cx+sw/2,top);ctx.lineTo(cx+sw/2+depth,top-depth*.5);ctx.lineTo(cx-sw/2+depth,top-depth*.5);ctx.closePath();ctx.fill();

  // Top face details
  ctx.fillStyle='rgba(0,100,40,.2)';ctx.beginPath();ctx.ellipse(cx+depth*.35,top-depth*.22,sw*.2,depth*.08,-.1,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,80,30,.18)';ctx.lineWidth=.5;
  for(let x=cx-sw/2+10;x<cx+sw/2-5;x+=10){ctx.beginPath();ctx.moveTo(x,top-1);ctx.lineTo(x+depth*.75,top-depth*.37-1);ctx.stroke();}

  // Border glow
  ctx.save();ctx.shadowColor='#22c55e';ctx.shadowBlur=16;ctx.strokeStyle='rgba(34,197,94,.3)';ctx.lineWidth=1;ctx.strokeRect(cx-sw/2,top,sw,clampedH);ctx.restore();

  // Height indicator
  const altM=bills*BILL_M;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.setLineDash([2,5]);
  ctx.beginPath();ctx.moveTo(cx-sw/2-28,top);ctx.lineTo(cx-sw/2-10,top);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-sw/2-28,gy);ctx.lineTo(cx-sw/2-10,gy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-sw/2-22,top);ctx.lineTo(cx-sw/2-22,gy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,.38)';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';
  ctx.fillText(formatAlt(altM),cx-sw/2-30,top+clampedH*.5+3);ctx.textAlign='left';
  ctx.restore();
}

// OBJECTS next to stack
function drawObjects(bills){
  if(bills<=0)return;
  const gy=H*.72,cx=W/2,altM=bills*BILL_M;
  const maxPx=H*.65;
  const pxPerBill=bills>maxPx?maxPx/bills:Math.max(.5,maxPx/Math.max(bills,1));
  const pxPerM=pxPerBill/BILL_M;
  const ox=cx+75;

  for(const obj of OBJECTS){
    if(!obj.draw)continue;
    if(obj.m>altM*2)break;
    if(obj.m<altM*0.002)continue;
    const objPxH=obj.m*pxPerM;
    if(objPxH<2)continue;
    const ratio=obj.m/altM;
    const opacity=Math.min(1,Math.min(ratio*4,(4/ratio)*.6));
    if(opacity<0.05)continue;
    ctx.save();ctx.globalAlpha=opacity;

    // Dashed line from top of stack to top of object
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.setLineDash([2,6]);
    ctx.beginPath();ctx.moveTo(cx+sw/2+22,gy-objPxH);ctx.lineTo(ox+objPxH*.5,gy-objPxH);ctx.stroke();ctx.setLineDash([]);

    // Label above object
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='10px DM Sans,sans-serif';
    ctx.fillText(`${obj.emoji} ${obj.label}`,ox+objPxH*.6+6,gy-objPxH-4);
    // Height label
    ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='8px DM Mono,monospace';
    ctx.fillText(formatAlt(obj.m),ox+objPxH*.6+6,gy-objPxH+8);

    // Draw the object
    obj.draw(ox+objPxH*.5,gy,objPxH);
    ctx.restore();
  }
}
const sw=110;

// HUD
function formatNum(n){if(n>=1e12)return(n/1e12).toFixed(2)+'T';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString('nl-NL');}
function formatAlt(m){if(m>=1e9)return(m/1e9).toFixed(3)+' Gm';if(m>=1e6)return(m/1e6).toFixed(3)+' Mm';if(m>=1000)return(m/1000).toFixed(4)+' km';if(m>=1)return m.toFixed(4)+' m';if(m>=0.01)return(m*100).toFixed(3)+' cm';return(m*1000).toFixed(3)+' mm';}
let bannerTO=null;
function showBanner(obj){
  document.getElementById('ms-emoji').textContent=obj.emoji;
  document.getElementById('ms-name').textContent=obj.label;
  document.getElementById('ms-sub').textContent=`${formatAlt(obj.m)} hoog · ${formatNum(Math.round(obj.m/BILL_M))} biljetten`;
  const el=document.getElementById('ms-banner');el.classList.add('show');
  if(bannerTO)clearTimeout(bannerTO);bannerTO=setTimeout(()=>el.classList.remove('show'),3500);
}
function updateHUD(){
  const altM=displayBills*BILL_M;
  const ae=document.getElementById('hud-alt'),ue=document.getElementById('hud-unit');
  if(altM>=1000){ae.textContent=(altM/1000).toFixed(4);ue.textContent='kilometer';}
  else if(altM>=1){ae.textContent=altM.toFixed(4);ue.textContent='meter';}
  else if(altM>=.01){ae.textContent=(altM*100).toFixed(3);ue.textContent='centimeter';}
  else{ae.textContent=(altM*1000).toFixed(3);ue.textContent='millimeter';}
  let next=null;for(const o of OBJECTS)if(o.m>altM){next=o;break;}
  document.getElementById('hud-next').textContent=next?`${next.emoji} ${next.label} — nog ${formatNum(Math.ceil((next.m-altM)/BILL_M))} klikken`:'🚀 Verder dan alles!';
  document.getElementById('bill-number').textContent=formatNum(totalBills);
  for(const obj of OBJECTS)if(obj.m>0&&altM>=obj.m&&!shownMS.has(obj.m)){shownMS.add(obj.m);localStorage.setItem('md3_m',JSON.stringify([...shownMS]));showBanner(obj);}
}
function updateScoreboard(){
  scores[myName]=myClicks;localStorage.setItem('md3_s',JSON.stringify(scores));
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const list=document.getElementById('score-list');list.innerHTML='';
  for(const[name,clicks]of sorted){const row=document.createElement('div');row.className='score-row'+(name===myName?' me':'');row.innerHTML=`<span class="score-name">${name}</span><span class="score-val">${formatNum(clicks)}</span>`;list.appendChild(row);}
}

// CLICK
function doClick(){
  totalBills++;myClicks++;localStorage.setItem('md3_b',totalBills);localStorage.setItem('md3_c',myClicks);
  updateHUD();updateScoreboard();spawnBill();broadcast({type:'click',name:myName,total:totalBills,scores});
}
document.getElementById('click-btn').addEventListener('click',doClick);
function spawnBill(){const btn=document.getElementById('click-btn');const r=btn.getBoundingClientRect();const el=document.createElement('div');el.className='fb';el.textContent='💵';el.style.left=(r.left+r.width/2-10+(Math.random()-.5)*25)+'px';el.style.top=(r.top-8)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),850);}

// NAME
const ni=document.getElementById('name-input');ni.value=myName;
ni.addEventListener('change',()=>{const v=ni.value.trim();if(!v)return;if(scores[myName]){scores[v]=(scores[v]||0)+scores[myName];delete scores[myName];}myName=v;localStorage.setItem('md3_n',myName);updateScoreboard();});

// MULTIPLAYER
let peer=null,connections=[];
function setStatus(msg,color='rgba(255,255,255,.3)'){const el=document.getElementById('mp-status');el.textContent=msg;el.style.color=color;}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function broadcast(data){for(const c of connections)if(c.open)try{c.send(data);}catch(e){}}
function handleData(id,data){
  if(data.type==='click'||data.type==='sync'){
    if(data.total>totalBills){totalBills=data.total;localStorage.setItem('md3_b',totalBills);}
    if(data.scores)for(const[n,c]of Object.entries(data.scores))if(n!==myName)scores[n]=Math.max(scores[n]||0,c);
    updateHUD();updateScoreboard();
  }
}
function setupConn(conn){
  connections.push(conn);
  conn.on('data',d=>handleData(conn.peer,d));
  conn.on('open',()=>{setStatus(`${connections.length} verbonden`,'#22c55e');conn.send({type:'sync',total:totalBills,scores});});
  conn.on('close',()=>{connections=connections.filter(c=>c!==conn);setStatus(connections.length?`${connections.length} verbonden`:'offline',connections.length?'#22c55e':'rgba(255,255,255,.3)');});
  conn.on('error',()=>{connections=connections.filter(c=>c!==conn);setStatus(connections.length?`${connections.length} verbonden`:'offline',connections.length?'#22c55e':'rgba(255,255,255,.3)');});
}
document.getElementById('btn-host').addEventListener('click',()=>{if(!window.Peer){setStatus('laden...','#fa0');return;}if(peer){peer.destroy();peer=null;connections=[];}const code=genCode();peer=new Peer(code);peer.on('open',id=>{setStatus(`code: ${id}`,'#6af');try{navigator.clipboard.writeText(id);}catch(e){}});peer.on('connection',conn=>setupConn(conn));peer.on('error',e=>setStatus('fout: '+e.type,'#f66'));});
const ci=document.getElementById('code-input'),bOK=document.getElementById('btn-join-confirm');
document.getElementById('btn-join').addEventListener('click',()=>{ci.style.display='inline-block';bOK.style.display='inline-block';ci.focus();});
bOK.addEventListener('click',doJoin);ci.addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});
function doJoin(){const code=ci.value.trim().toUpperCase();if(!code)return;ci.style.display='none';bOK.style.display='none';if(!window.Peer){setStatus('laden...','#fa0');return;}if(peer){peer.destroy();peer=null;connections=[];}peer=new Peer();peer.on('open',()=>{setStatus('verbinden...','#fa0');setupConn(peer.connect(code));});peer.on('error',e=>setStatus('fout: '+e.type,'#f66'));}

// LOOP
function loop(){
  requestAnimationFrame(loop);
  displayBills+=(totalBills-displayBills)*.1;
  const altM=displayBills*BILL_M;
  ctx.clearRect(0,0,W,H);
  drawSky(altM);drawStars(altM);drawClouds(altM);drawAsphalt(altM);
  drawObjects(displayBills);
  drawMoneyStack(displayBills);
  updateHUD();
}
updateHUD();updateScoreboard();loop();
</script>
</body>
